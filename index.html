<!DOCTYPE html>
<html>
<head>
  <title>NPM Publish Time</title>
</head>
<body>
  <h2>NPM Publish Time Checker</h2>

  <input id="pkg" placeholder="Package name (react)" />
  <input id="ver" placeholder="Version (18.2.0)" />
  <button onclick="getTime()">Check</button>

  <pre id="result"></pre>
<script>
function timeAgo(dateString) {
  const now = new Date();
  const past = new Date(dateString);

  const diffMs = now - past;
  const diffDays = diffMs / (1000 * 60 * 60 * 24);

  const years = Math.floor(diffDays / 365);
  if (years >= 1) {
    return `${years} year${years > 1 ? "s" : ""} ago`;
  }

  const months = Math.round(diffDays / 30); // ✅ KEY CHANGE (round instead of floor)
  if (months >= 1) {
    return `${months} month${months > 1 ? "s" : ""} ago`;
  }

  const days = Math.floor(diffDays);
  if (days >= 1) {
    return `${days} day${days > 1 ? "s" : ""} ago`;
  }

  return "just now";
}
  async function getTime(pkg, ver) {
    // If values not passed, read from inputs
    if (!pkg) pkg = document.getElementById("pkg").value;
    if (!ver) ver = document.getElementById("ver").value;

    document.getElementById("result").innerText = "Loading...";

    const res = await fetch(`https://registry.npmjs.org/${pkg}`);
    const data = await res.json();

    const time = data.time?.[ver];

    if (time) {
      const result = {
        package: pkg,
        version: ver,
        relative: timeAgo(time)
      };

      document.getElementById("result").innerText =
        `Published ${result.relative}\n\n` +
        JSON.stringify(result);
    } else {
      document.getElementById("result").innerText =
        JSON.stringify({ error: "Version not found" });
    }



  // ✅ Add THIS PART (auto-read from URL)
  window.onload = () => {
    const params = new URLSearchParams(window.location.search);
    const pkg = params.get("pkg");
    const ver = params.get("ver");

    if (pkg && ver) {
      // Fill input fields (optional UX)
      document.getElementById("pkg").value = pkg;
      document.getElementById("ver").value = ver;

      // Auto-run
      getTime(pkg, ver);
    }
  };
</script>
</body>
</html>
